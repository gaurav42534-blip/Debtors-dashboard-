- name: Run pg_dump
  env:
    DATABASE_URL: ${{ secrets.DATABASE_URL }}
  run: |
    if [ -z "$DATABASE_URL" ]; then
      echo "ERROR: DATABASE_URL secret is not set or is empty"
      exit 1
    fi

    TIMESTAMP=$(date +%Y%m%d_%H%M%S)

    # Extract hostname from DATABASE_URL
    DB_HOST=$(echo "$DATABASE_URL" | sed -E 's|.*@([^:/?]+).*|\1|')

    echo "Resolving IPv4 for $DB_HOST"

    # Get IPv4 only
    export PGHOSTADDR=$(getent ahostsv4 "$DB_HOST" | awk '{ print $1; exit }')

    if [ -z "$PGHOSTADDR" ]; then
      echo "ERROR: Could not resolve IPv4 address"
      exit 1
    fi

    echo "Using IPv4: $PGHOSTADDR"

    pg_dump \
      --dbname="$DATABASE_URL" \
      --no-owner \
      --no-acl \
      -F p \
      -f "backup_${TIMESTAMP}.sql"

    echo "Backup file: backup_${TIMESTAMP}.sql"
